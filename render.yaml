services:
  - type: web
    name: datamatrix-auth-backend
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: datamatrix-auth-db
          property: connectionString
      - key: APP_ENV
        value: production
      - key: ACCESS_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: OFFLINE_GRACE_DAYS
        value: "3"
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_SECRET_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: ADMIN_API_KEY
        sync: false
